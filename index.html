<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
body { font-family: 'Noto Sans JP', sans-serif; }
.tabular { font-variant-numeric: tabular-nums; }
input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">

<div id="app" class="max-w-6xl mx-auto px-4 py-6">

  <header class="flex flex-wrap items-center justify-between gap-4 mb-4">
    <h1 class="text-xl font-bold flex items-center gap-2">
      <span class="text-2xl">📊</span> <span id="headerTitle">利益管理ダッシュボード</span>
    </h1>
    <div class="flex items-center gap-3">
      <select id="yearSelect" class="rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-3 py-1.5 text-sm"></select>
      <div class="flex items-center gap-2">
        <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition">◀</button>
        <span id="monthLabel" class="text-sm font-medium min-w-[3rem] text-center"></span>
        <button onclick="changeMonth(1)" class="w-8 h-8 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition">▶</button>
      </div>
      <div class="relative">
        <button onclick="document.getElementById('ioMenu').classList.toggle('hidden')" class="h-8 px-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center gap-1 hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm">📁 データ ▾</button>
        <div id="ioMenu" class="hidden absolute right-0 mt-1 w-48 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg z-50 overflow-hidden">
          <button onclick="exportJSON();closeIO()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">📤 JSONエクスポート</button>
          <button onclick="exportCSV();closeIO()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">📤 CSVエクスポート</button>
          <button onclick="document.getElementById('importJSON').click();closeIO()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">📥 JSONインポート</button>
          <button onclick="document.getElementById('importCSV').click();closeIO()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">📥 CSVインポート</button>
          <button onclick="if(confirm('全データを削除しますか？')){data={};saveData();render();}closeIO()" class="w-full text-left px-4 py-2.5 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">🗑️ データリセット</button>
        </div>
        <input type="file" id="importJSON" accept=".json" class="hidden" onchange="handleImportJSON(this)">
        <input type="file" id="importCSV" accept=".csv" class="hidden" onchange="handleImportCSV(this)">
      </div>
      <div class="relative">
        <button onclick="document.getElementById('syncMenu').classList.toggle('hidden')" id="syncBtn" class="h-8 px-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center gap-1 hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm">☁️ 同期 ▾</button>
        <div id="syncMenu" class="hidden absolute right-0 mt-1 w-52 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg z-50 overflow-hidden">
          <button onclick="cloudSave();closeSyncMenu()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition">📤 クラウドに保存</button>
          <button onclick="cloudLoad();closeSyncMenu()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">📥 クラウドから読込</button>
          <button onclick="toggleAutoSync();closeSyncMenu()" id="autoSyncBtn" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">🔄 自動同期ON</button>
          <button onclick="setupGasUrl();closeSyncMenu()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition border-t border-gray-100 dark:border-gray-700">⚙️ API URL設定</button>
        </div>
      </div>
      <button onclick="toggleDark()" class="w-8 h-8 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm">🌓</button>
    </div>
  </header>

  <!-- Mode switcher -->
  <div class="flex gap-1 mb-4">
    <button onclick="switchMode('biz')" id="modeBtn_biz" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">💼 事業管理</button>
    <button onclick="switchMode('life')" id="modeBtn_life" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">🏠 生活管理</button>
    <button onclick="switchMode('special')" id="modeBtn_special" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">📝 特別費</button>
  </div>

  <div id="kpiCards" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>

  <div id="tabBar" class="flex gap-1 mb-4 overflow-x-auto"></div>

  <div id="mainContent"></div>

</div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

const BIZ_CATEGORIES = {
  fixed: { label: '固定費', color: '#EF9F27', items: ['給与（特別費込み）','専従者給与','住宅ローン','事業ローン','社会保険料','セーフティ共済'] },
  variable: { label: '変動費', color: '#3266ad', items: ['仕入高','水道光熱費','支払手数料','消耗品費','車両費','通信費','リース料','研修費','雑費','接待交際費','損害保険料','新聞図書費'] },
  other: { label: 'その他経費', color: '#1D9E75', items: ['グルーニー年会費','保証協会年支払い','消費税等','諸会費','広告宣伝費','旅費交通費','HPB','修繕費'] },
  biz: { label: '事業経費', color: '#7F77DD', items: ['事業経費'] }
};
const BIZ_SALES_ITEMS = ['売上高', 'family'];

const LIFE_EXPENSE_CATS = {
  monthly_fixed: { label: '毎月固定費', color: '#EF9F27', items: ['サブスク','習い事','習い事【子供】','水道光熱費','保険料','通信費'] },
  monthly_var: { label: '毎月変動費', color: '#3266ad', items: ['食費','日用品','被服費','美容費','医療費','交通費','かおり食費','かおり日用品'] },
  irreg_fixed: { label: '不定期固定費', color: '#D85A30', items: ['税金【家、車】','年会費','教育費','特別費'] },
  irreg_var: { label: '不定期変動費', color: '#7F77DD', items: ['家電・家具','車両代','旅行','冠婚葬祭','卒業・入学','病気治療費'] }
};
const LIFE_INCOME_ITEMS = {
  budget: { label: '予算内', color: '#1D9E75', items: ['月収','売電','副業(FANZA)'] },
  extra: { label: '予算外', color: '#534AB7', items: ['臨時収入','残業','賞与'] }
};
const LIFE_INVEST_CATS = {
  invest: { label: '投資', color: '#1D9E75', items: ['NISA','セーフティ共済','児童手当','特別費（預金）'] },
  saving: { label: '貯金', color: '#3266ad', items: ['貯金'] }
};

let state = { year: 2026, month: 0, tab: 'overview', mode: 'biz' };
let data = {};
let charts = {};

function storageKey() { return 'profit_dashboard_v2'; }
function loadData() { try { data = JSON.parse(localStorage.getItem(storageKey())) || {}; } catch(e) { data = {}; } }
function saveData() { localStorage.setItem(storageKey(), JSON.stringify(data)); }

function getVal(year, mi, cat, item) { return data[`${year}_${mi}_${cat}_${item}`] || 0; }
function setVal(year, mi, cat, item, val) { data[`${year}_${mi}_${cat}_${item}`] = val; saveData(); }

function fmt(v) { return '¥' + Math.round(v).toLocaleString(); }
function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }
function fmtMan(v) { return '¥' + Math.round(v / 10000) + '万'; }

function getCatTotal(cats, year, mi, catKey) { return cats[catKey].items.reduce((s, item) => s + getVal(year, mi, catKey, item), 0); }
function sum12(fn) { return Array.from({length:12}, (_,i) => fn(i)).reduce((a,b)=>a+b,0); }

// === BIZ helpers ===
function bizExpenseTotal(y, m) { return ['fixed','variable','other','biz'].reduce((s, c) => s + getCatTotal(BIZ_CATEGORIES, y, m, c), 0); }
function bizSales(y, m) { return BIZ_SALES_ITEMS.reduce((s, item) => s + getVal(y, m, 'sales', item), 0); }
function bizProfit(y, m) { return bizSales(y, m) - bizExpenseTotal(y, m); }

// === LIFE helpers ===
function lifeExpenseTotal(y, m) { return Object.keys(LIFE_EXPENSE_CATS).reduce((s, c) => s + getCatTotal(LIFE_EXPENSE_CATS, y, m, c), 0); }
function lifeIncomeTotal(y, m) { return Object.keys(LIFE_INCOME_ITEMS).reduce((s, c) => s + getCatTotal(LIFE_INCOME_ITEMS, y, m, c), 0); }
function lifeInvestTotal(y, m) { return Object.keys(LIFE_INVEST_CATS).reduce((s, c) => s + getCatTotal(LIFE_INVEST_CATS, y, m, c), 0); }
function lifeBalance(y, m) { return lifeIncomeTotal(y, m) - lifeExpenseTotal(y, m) - lifeInvestTotal(y, m); }

function changeMonth(d) { state.month = (state.month + d + 12) % 12; render(); }
function toggleDark() { document.documentElement.classList.toggle('dark'); destroyCharts(); render(); }
function switchTab(tab) { state.tab = tab; render(); }
function switchMode(mode) { state.mode = mode; state.tab = 'overview'; destroyCharts(); render(); }
function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function delta(cur, prev, invert) {
  if (prev === 0) return '<span class="text-gray-400 text-xs">—</span>';
  const pct = ((cur - prev) / Math.abs(prev) * 100).toFixed(1);
  const up = parseFloat(pct) >= 0;
  const good = invert ? !up : up;
  return `<span class="text-xs ${good ? 'text-emerald-600' : 'text-red-500'}">${up ? '↑' : '↓'} ${Math.abs(pct)}% 前月比</span>`;
}

function kpiCard(label, value, deltaHtml, colorClass) {
  return `<div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
    <div class="text-xs text-gray-500 mb-1">${label}</div>
    <div class="text-xl font-bold tabular ${colorClass || ''}">${value}</div>
    <div class="mt-1">${deltaHtml}</div>
  </div>`;
}

function makeChart(canvasId, config) {
  if (charts[canvasId]) charts[canvasId].destroy();
  const c = new Chart(document.getElementById(canvasId), config);
  charts[canvasId] = c;
  return c;
}

function chartColors() {
  const isDark = document.documentElement.classList.contains('dark');
  return { grid: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)', tick: isDark ? '#9ca3af' : '#6b7280' };
}

// ============================
// RENDER
// ============================
function render() {
  const y = state.year, m = state.month;
  document.getElementById('monthLabel').textContent = MONTHS[m];
  document.getElementById('headerTitle').textContent = state.mode === 'biz' ? '利益管理ダッシュボード' : state.mode === 'life' ? '生活費管理ダッシュボード' : '特別費で支払ったもの';

  document.querySelectorAll('.mode-btn').forEach(b => {
    const id = b.id.replace('modeBtn_', '');
    const active = id === state.mode;
    const activeColor = id === 'biz' ? 'bg-blue-600 text-white' : id === 'life' ? 'bg-emerald-600 text-white' : 'bg-amber-600 text-white';
    const inactiveColor = 'bg-white dark:bg-gray-800 text-gray-500 border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700';
    const colors = active ? activeColor : inactiveColor;
    b.className = `mode-btn px-5 py-2 rounded-lg text-sm font-bold transition ${colors}`;
  });

  if (state.mode === 'biz') renderBiz(y, m);
  else if (state.mode === 'life') renderLife(y, m);
  else renderSpecial(y);
}

// ============================
// BIZ MODE
// ============================
function renderBiz(y, m) {
  const tabs = [
    {id:'overview',label:'概要'},{id:'fixed',label:'固定費'},{id:'variable',label:'変動費'},
    {id:'other',label:'その他経費'},{id:'annual',label:'年間総合'},{id:'average',label:'月平均'},{id:'input',label:'入力'}
  ];
  renderTabBar(tabs);

  const sales = bizSales(y, m), expense = bizExpenseTotal(y, m), profit = bizProfit(y, m);
  const rate = sales > 0 ? profit / sales : 0;
  const pm = (m - 1 + 12) % 12, py = m === 0 ? y - 1 : y;
  const ps = bizSales(py, pm), pe = bizExpenseTotal(py, pm), pp = ps - pe, pr = ps > 0 ? pp / ps : 0;

  document.getElementById('kpiCards').innerHTML =
    kpiCard('月間売上', fmt(sales), delta(sales, ps, false)) +
    kpiCard('月間経費', fmt(expense), delta(expense, pe, true)) +
    kpiCard('営業利益', fmt(profit), delta(profit, pp, false), profit >= 0 ? 'text-emerald-600' : 'text-red-500') +
    kpiCard('利益率', fmtPct(rate), sales > 0 && ps > 0 ? `<span class="text-xs ${rate >= pr ? 'text-emerald-600' : 'text-red-500'}">${rate >= pr ? '↑' : '↓'} ${Math.abs((rate - pr) * 100).toFixed(1)}pt 前月比</span>` : '<span class="text-gray-400 text-xs">—</span>');

  const mc = document.getElementById('mainContent');
  if (state.tab === 'overview') mc.innerHTML = bizOverviewHTML(y, m);
  else if (state.tab === 'annual') mc.innerHTML = bizAnnualHTML(y);
  else if (state.tab === 'average') mc.innerHTML = bizAverageHTML(y);
  else if (state.tab === 'input') mc.innerHTML = bizInputHTML(y, m);
  else mc.innerHTML = bizCategoryHTML(y, state.tab);

  if (state.tab === 'overview') { renderBizTrendChart(y); renderBizPieChart(y, m); }
  if (state.tab === 'average') renderBizAvgChart(y);
}

function renderTabBar(tabs) {
  document.getElementById('tabBar').innerHTML = tabs.map(t =>
    `<button onclick="switchTab('${t.id}')" data-tab="${t.id}" class="tab-btn px-4 py-1.5 rounded-lg text-sm font-medium transition ${t.id === state.tab ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white' : 'text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800'}">${t.label}</button>`
  ).join('');
}

function bizOverviewHTML(y, m) {
  const pm = (m-1+12)%12, py = m===0?y-1:y;
  let rows = '';
  for (const [ck, cat] of Object.entries(BIZ_CATEGORIES)) {
    cat.items.forEach(item => {
      const cur = getVal(y,m,ck,item), prev = getVal(py,pm,ck,item), diff = cur-prev;
      const ann = sum12(i => getVal(y,i,ck,item));
      rows += `<div class="t-row"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-sm" style="background:${cat.color}"></span>${item}</div><div class="text-right tabular">${fmt(cur)}</div><div class="text-right tabular text-gray-500">${fmt(prev)}</div><div class="text-right tabular ${diff>0?'text-red-500':diff<0?'text-emerald-600':'text-gray-400'}">${diff===0?'—':(diff>0?'+':'')+fmt(diff)}</div><div class="text-right tabular">${fmt(ann)}</div></div>`;
    });
    const ct = getCatTotal(BIZ_CATEGORIES,y,m,ck), pt = getCatTotal(BIZ_CATEGORIES,py,pm,ck), dt = ct-pt;
    const at = sum12(i => getCatTotal(BIZ_CATEGORIES,y,i,ck));
    rows += `<div class="t-row font-medium bg-gray-50 dark:bg-gray-700/50"><div>${cat.label} 小計</div><div class="text-right tabular">${fmt(ct)}</div><div class="text-right tabular text-gray-500">${fmt(pt)}</div><div class="text-right tabular ${dt>0?'text-red-500':dt<0?'text-emerald-600':'text-gray-400'}">${dt===0?'—':(dt>0?'+':'')+fmt(dt)}</div><div class="text-right tabular">${fmt(at)}</div></div>`;
  }

  const aS = sum12(i=>bizSales(y,i)), aF = sum12(i=>getCatTotal(BIZ_CATEGORIES,y,i,'fixed'));
  const aV = sum12(i=>bizExpenseTotal(y,i)) - aF;
  const vr = aS>0?aV/aS:0, mr2 = 1-vr, bep = mr2>0?aF/mr2:0, sf = aS>0?(aS-bep)/aS:0;
  const aE = sum12(i=>bizExpenseTotal(y,i)), aP = aS-aE, aR = aS>0?aP/aS:0;
  const mwd = Array.from({length:12},(_,i)=>bizSales(y,i)>0||bizExpenseTotal(y,i)>0?1:0).reduce((a,b)=>a+b,0);

  return `
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
    <div class="lg:col-span-2 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <div class="text-sm font-medium mb-2">月次推移</div>
      <div id="legendTrend" class="flex flex-wrap gap-4 text-xs text-gray-500 mb-2"></div>
      <div class="relative h-56"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <div class="text-sm font-medium mb-2">費用構成比</div>
      <div id="legendPie" class="flex flex-wrap gap-3 text-xs text-gray-500 mb-2"></div>
      <div class="relative h-56"><canvas id="pieChart"></canvas></div>
    </div>
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden mb-6">
    <div class="text-sm font-medium p-4 pb-2">経費内訳（${MONTHS[m]}）</div>
    <div class="grid grid-cols-[2fr_1fr_1fr_1fr_1fr] px-4 py-2 text-xs text-gray-500 font-medium border-b border-gray-200 dark:border-gray-700">
      <div>項目</div><div class="text-right">当月</div><div class="text-right">前月</div><div class="text-right">増減</div><div class="text-right">年間累計</div>
    </div>
    <style>.t-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:8px 16px;font-size:13px;border-top:1px solid rgba(0,0,0,0.05)}.t-row:hover{background:rgba(0,0,0,0.02)}</style>
    ${rows}
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <div class="text-sm font-medium mb-3">損益分岐点分析</div>
      <div class="mb-3"><div class="text-xs text-gray-500">損益分岐点売上高（年間）</div><div class="text-2xl font-bold text-red-500 tabular">${fmt(bep)}</div>
      <div class="text-xs text-gray-500 mt-1">${aS>bep?`現在の売上は損益分岐点を ${fmt(aS-bep)} 上回っています`:aS>0?`損益分岐点まで ${fmt(bep-aS)} 不足しています`:'データを入力してください'}</div></div>
      <div class="grid grid-cols-2 gap-3">
        <div><div class="text-xs text-gray-500">変動費率</div><div class="text-lg font-bold tabular">${fmtPct(vr)}</div></div>
        <div><div class="text-xs text-gray-500">限界利益率</div><div class="text-lg font-bold tabular">${fmtPct(mr2)}</div></div>
        <div><div class="text-xs text-gray-500">安全余裕率</div><div class="text-lg font-bold tabular ${sf>=0?'text-emerald-600':'text-red-500'}">${fmtPct(sf)}</div></div>
      </div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <div class="text-sm font-medium mb-3">年間累計サマリー</div>
      <div class="grid grid-cols-2 gap-3">
        <div><div class="text-xs text-gray-500">年間売上</div><div class="text-lg font-bold tabular">${fmt(aS)}</div></div>
        <div><div class="text-xs text-gray-500">年間経費</div><div class="text-lg font-bold tabular">${fmt(aE)}</div></div>
        <div><div class="text-xs text-gray-500">年間利益</div><div class="text-lg font-bold tabular ${aP>=0?'text-emerald-600':'text-red-500'}">${fmt(aP)}</div></div>
        <div><div class="text-xs text-gray-500">年間利益率</div><div class="text-lg font-bold tabular">${fmtPct(aR)}</div></div>
        <div><div class="text-xs text-gray-500">入力済み月数</div><div class="text-lg font-bold">${mwd} / 12</div></div>
        <div><div class="text-xs text-gray-500">月平均利益</div><div class="text-lg font-bold tabular">${mwd>0?fmt(aP/mwd):'—'}</div></div>
      </div>
    </div>
  </div>`;
}

function renderBizTrendChart(y) {
  const cc = chartColors();
  const sd = MONTHS.map((_,i) => bizSales(y,i)||null);
  const ed = MONTHS.map((_,i) => { const e=bizExpenseTotal(y,i); return e>0?e:null; });

function renderLife(y, m) {
  const tabs = [
    {id:'overview',label:'概要'},{id:'monthly_fixed',label:'毎月固定費'},{id:'monthly_var',label:'毎月変動費'},
    {id:'irreg_fixed',label:'不定期固定費'},{id:'irreg_var',label:'不定期変動費'},
    {id:'annual',label:'年間総合'},{id:'average',label:'月平均'},{id:'input',label:'入力'}
  ];
  renderTabBar(tabs);

  const income = lifeIncomeTotal(y, m), expense = lifeExpenseTotal(y, m);
  const balance = income - expense;
  const pm = (m-1+12)%12, py2 = m===0?y-1:y;
  const pi = lifeIncomeTotal(py2,pm), pex = lifeExpenseTotal(py2,pm), pbal = pi-pex;

  document.getElementById('kpiCards').innerHTML =
    kpiCard('月間収入', fmt(income), delta(income, pi, false)) +
    kpiCard('月間支出', fmt(expense), delta(expense, pex, true)) +
    kpiCard('収支', fmt(balance), delta(balance, pbal, false), balance >= 0 ? 'text-emerald-600' : 'text-red-500');

  const mc = document.getElementById('mainContent');
  if (state.tab === 'overview') { mc.innerHTML = lifeOverviewHTML(y, m); renderLifeTrendChart(y); renderLifePieChart(y, m); }
  else if (state.tab === 'annual') mc.innerHTML = lifeAnnualHTML(y);
  else if (state.tab === 'average') { mc.innerHTML = lifeAverageHTML(y); renderLifeAvgChart(y); }
  else if (state.tab === 'input') mc.innerHTML = lifeInputHTML(y, m);
  else mc.innerHTML = lifeCategoryHTML(y, state.tab);
}

function lifeOverviewHTML(y, m) {
  const pm=(m-1+12)%12, py=m===0?y-1:y;
  const income=lifeIncomeTotal(y,m), expense=lifeExpenseTotal(y,m);
  const expRate = income>0 ? expense/income*100 : 0;
  const target80 = expRate <= 80;

  // Expense table
  let rows = '';
  for(const[ck,cat]of Object.entries(LIFE_EXPENSE_CATS)){
    cat.items.forEach(item=>{
      const cur=getVal(y,m,ck,item),prev=getVal(py,pm,ck,item),diff=cur-prev;
      const ann=sum12(i=>getVal(y,i,ck,item));
      rows+=`<div class="t-row"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-sm" style="background:${cat.color}"></span>${item}</div><div class="text-right tabular">${fmt(cur)}</div><div class="text-right tabular text-gray-500">${fmt(prev)}</div><div class="text-right tabular ${diff>0?'text-red-500':diff<0?'text-emerald-600':'text-gray-400'}">${diff===0?'—':(diff>0?'+':'')+fmt(diff)}</div><div class="text-right tabular">${fmt(ann)}</div></div>`;
    });
    const ct=getCatTotal(LIFE_EXPENSE_CATS,y,m,ck),pt=getCatTotal(LIFE_EXPENSE_CATS,py,pm,ck),dt=ct-pt;
    const at=sum12(i=>getCatTotal(LIFE_EXPENSE_CATS,y,i,ck));
    rows+=`<div class="t-row font-medium bg-gray-50 dark:bg-gray-700/50"><div>${cat.label} 小計</div><div class="text-right tabular">${fmt(ct)}</div><div class="text-right tabular text-gray-500">${fmt(pt)}</div><div class="text-right tabular ${dt>0?'text-red-500':dt<0?'text-emerald-600':'text-gray-400'}">${dt===0?'—':(dt>0?'+':'')+fmt(dt)}</div><div class="text-right tabular">${fmt(at)}</div></div>`;
  }

  // Income table
  let incRows = '';
  for(const[ck,cat]of Object.entries(LIFE_INCOME_ITEMS)){
    cat.items.forEach(item=>{
      const cur=getVal(y,m,ck,item), ann=sum12(i=>getVal(y,i,ck,item));
      incRows+=`<tr class="border-t border-gray-100 dark:border-gray-700"><td class="py-2 px-3 text-sm"><span class="inline-block w-2 h-2 rounded-sm mr-2" style="background:${cat.color}"></span>${item}</td><td class="py-2 px-3 text-right text-sm tabular">${fmt(cur)}</td><td class="py-2 px-3 text-right text-sm tabular text-gray-500">${fmt(ann)}</td></tr>`;
    });
    const ct=getCatTotal(LIFE_INCOME_ITEMS,y,m,ck);
    incRows+=`<tr class="bg-gray-50 dark:bg-gray-700/50 border-t font-medium"><td class="py-2 px-3 text-sm">${cat.label} 小計</td><td class="py-2 px-3 text-right text-sm tabular">${fmt(ct)}</td><td class="py-2 px-3 text-right text-sm tabular text-gray-500">${fmt(sum12(i=>getCatTotal(LIFE_INCOME_ITEMS,y,i,ck)))}</td></tr>`;
  }

  // Invest table
  let invRows = '';
  for(const[ck,cat]of Object.entries(LIFE_INVEST_CATS)){

function downloadFile(name, content, type) { const blob = new Blob([content], { type }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); URL.revokeObjectURL(a.href); }

  const y = state.year;

  for (let m2=0;m2<12;m2++) {
    for(const si of BIZ_SALES_ITEMS){const v=getVal(y,m2,'sales',si);if(v)csv+=`${y},${MONTHS[m2]},売上,${si},${v}\n`;}

    for(const[ck,cat]of Object.entries(LIFE_INCOME_ITEMS)){for(const item of cat.items){const v=getVal(y,m2,ck,item);if(v)csv+=`${y},${MONTHS[m2]},収入:${cat.label},${item},${v}\n`;}}
    for(const[ck,cat]of Object.entries(LIFE_EXPENSE_CATS)){for(const item of cat.items){const v=getVal(y,m2,ck,item);if(v)csv+=`${y},${MONTHS[m2]},支出:${cat.label},${item},${v}\n`;}}

function handleImportJSON(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { try { Object.assign(data, JSON.parse(e.target.result)); saveData(); render(); alert('JSONインポートが完了しました'); } catch(err) { alert('JSONの読み込みに失敗しました: ' + err.message); } };
  reader.readAsText(file); input.value = '';
}

function handleImportCSV(input) {
  const file = input.files[0]; if (!file) return;
  const allCats = {};
  for(const[k,v]of Object.entries(BIZ_CATEGORIES)) allCats[v.label]=k;
  for(const[k,v]of Object.entries(LIFE_EXPENSE_CATS)) allCats['支出:'+v.label]=k;
  for(const[k,v]of Object.entries(LIFE_INCOME_ITEMS)) allCats['収入:'+v.label]=k;
  for(const[k,v]of Object.entries(LIFE_INVEST_CATS)) allCats['投資:'+v.label]=k;
  const monthToIdx = {}; MONTHS.forEach((m2,i)=>monthToIdx[m2]=i);
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const lines = e.target.result.split('\n').filter(l=>l.trim()); let count = 0;
      for(let i=1;i<lines.length;i++){const cols=lines[i].split(',');if(cols.length<5)continue;const yr=parseInt(cols[0]),mon=cols[1].trim(),catL=cols[2].trim(),item=cols[3].trim(),val=parseFloat(cols[4]);if(isNaN(yr)||isNaN(val)||!(mon in monthToIdx))continue;const mi=monthToIdx[mon];if(catL==='売上'){setVal(yr,mi,'sales',item,val);}else if(catL in allCats){setVal(yr,mi,allCats[catL],item,val);}count++;}
      render(); alert(`CSVインポート完了: ${count}件`);
    } catch(err) { alert('CSVの読み込みに失敗しました: ' + err.message); }
  };
  reader.readAsText(file); input.value = '';
}

  SPECIAL_TAGS.forEach(t => tagTotals[t] = 0);
  let grandTotal = 0;
  rows.forEach(r => { const amt = Number(r.amount) || 0; grandTotal += amt; if (r.tag && tagTotals[r.tag] !== undefined) tagTotals[r.tag] += amt; });

  let summaryCards = `<div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700"><div class="text-xs text-gray-500 mb-1">合計金額</div><div class="text-xl font-bold tabular">${fmt(grandTotal)}</div><div class="text-xs text-gray-500 mt-1">${rows.filter(r=>r.amount).length}件</div></div>`;
  SPECIAL_TAGS.forEach(t => {
    if (tagTotals[t] > 0) {
      summaryCards += `<div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700"><div class="text-xs text-gray-500 mb-1">${t}</div><div class="text-lg font-bold tabular">${fmt(tagTotals[t])}</div></div>`;
    }
  });

  // Table rows
  const rowCount = Math.max(rows.length, SPECIAL_DEFAULT);
  let tableRows = '';
  for (let i = 0; i < rowCount; i++) {
    const r = rows[i] || { date: '', content: '', tag: '', amount: '' };
    const tagOptions = SPECIAL_TAGS.map(t => `<option value="${t}" ${r.tag===t?'selected':''}>${t}</option>`).join('');
    tableRows += `<tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30">
      <td class="py-1 px-2 text-center text-xs text-gray-400 w-8">${i+1}</td>
      <td class="py-1 px-1"><input type="date" value="${r.date}" onchange="updateSpecialRow(${y},${i},'date',this.value)" class="w-full rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-2 py-1.5 text-sm"></td>
      <td class="py-1 px-1"><input type="text" value="${r.content||''}" onchange="updateSpecialRow(${y},${i},'content',this.value)" class="w-full rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-2 py-1.5 text-sm" placeholder="内容"></td>
      <td class="py-1 px-1"><select onchange="updateSpecialRow(${y},${i},'tag',this.value)" class="w-full rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-2 py-1.5 text-sm"><option value="">--分類--</option>${tagOptions}</select></td>
      <td class="py-1 px-1"><input type="number" value="${r.amount||''}" onchange="updateSpecialRow(${y},${i},'amount',this.value)" class="w-full rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-2 py-1.5 text-sm tabular text-right" placeholder="0"></td>
      <td class="py-1 px-1"><input type="text" value="${r.memo||''}" onchange="updateSpecialRow(${y},${i},'memo',this.value)" class="w-full rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-2 py-1.5 text-sm" placeholder="メモ"></td>
    </tr>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">${summaryCards}</div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-x-auto">
      <table class="w-full min-w-[600px]">
        <thead><tr class="bg-gray-50 dark:bg-gray-700/50">
          <th class="py-2 px-2 text-center text-xs font-medium text-gray-500 w-8">#</th>
          <th class="py-2 px-2 text-left text-xs font-medium text-gray-500 w-36">日付</th>
          <th class="py-2 px-2 text-left text-xs font-medium text-gray-500">内容</th>
          <th class="py-2 px-2 text-left text-xs font-medium text-gray-500 w-44">分類</th>
          <th class="py-2 px-2 text-right text-xs font-medium text-gray-500 w-32">金額</th>
          <th class="py-2 px-2 text-left text-xs font-medium text-gray-500 w-40">メモ</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="p-3 border-t border-gray-200 dark:border-gray-700">
        <button onclick="addSpecialRows(${y})" class="w-full py-2 rounded-lg border border-dashed border-gray-300 dark:border-gray-600 text-sm text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">＋ 行を追加</button>
      </div>
    </div>`;
}

function addSpecialRows(y) {
  const rows = getSpecialData(y);
  for (let i = 0; i < 10; i++) rows.push({ date:'', content:'', tag:'', amount:'' });
  saveSpecialData(y, rows);
  renderSpecial(y);
}

function updateSpecialRow(y, idx, field, value) {
  const rows = getSpecialData(y);
  while (rows.length <= idx) rows.push({ date:'', content:'', tag:'', amount:'' });
  rows[idx][field] = field === 'amount' ? (Number(value) || 0) : value;
  saveSpecialData(y, rows);
  // Update summary cards without full re-render to keep focus
  const tagTotals = {}; SPECIAL_TAGS.forEach(t => tagTotals[t] = 0); let gt = 0;
  rows.forEach(r => { const amt = Number(r.amount)||0; gt += amt; if(r.tag && tagTotals[r.tag]!==undefined) tagTotals[r.tag]+=amt; });
  const kpiEl = document.querySelector('.grid.grid-cols-2.md\\:grid-cols-4');
  if (kpiEl) {
    let sc = `<div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700"><div class="text-xs text-gray-500 mb-1">合計金額</div><div class="text-xl font-bold tabular">${fmt(gt)}</div><div class="text-xs text-gray-500 mt-1">${rows.filter(r=>r.amount).length}件</div></div>`;
    SPECIAL_TAGS.forEach(t => { if(tagTotals[t]>0) sc+=`<div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700"><div class="text-xs text-gray-500 mb-1">${t}</div><div class="text-lg font-bold tabular">${fmt(tagTotals[t])}</div></div>`; });
    kpiEl.innerHTML = sc;
  }
}

// ============================
// CLOUD SYNC (Google Sheets via GAS)
// ============================
let GAS_URL = localStorage.getItem('gas_url') || '';
let autoSync = false;
let syncTimer = null;

function setupGasUrl() {
  const url = prompt('Google Apps Script のURLを入力してください:', GAS_URL);
  if (url !== null) { GAS_URL = url.trim(); localStorage.setItem('gas_url', GAS_URL); alert(GAS_URL ? 'API URL を設定しました' : 'API URL をクリアしました'); }
}
function closeSyncMenu() { document.getElementById('syncMenu').classList.add('hidden'); }
document.addEventListener('click', e => { const sm = document.getElementById('syncMenu'); if (sm && !sm.classList.contains('hidden') && !e.target.closest('#syncBtn') && !e.target.closest('#syncMenu')) sm.classList.add('hidden'); });

function showSyncStatus(msg, isError) {
  const btn = document.getElementById('syncBtn');
  const orig = btn.textContent;
  btn.textContent = msg;
  if (isError) btn.classList.add('text-red-500');
  else btn.classList.remove('text-red-500');
  setTimeout(() => { btn.textContent = autoSync ? '☁️ 自動同期中 ▾' : '☁️ 同期 ▾'; btn.classList.remove('text-red-500'); }, 2000);
}

function cloudSave() {
  if (!GAS_URL) { alert('☁️ 同期 ▾ → ⚙️ API URL設定 からGAS URLを設定してください。'); return; }
  showSyncStatus('⏳ 保存中...', false);
  fetch(GAS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'save', data: data })
  }).then(() => {
    showSyncStatus('✅ 保存完了', false);
  }).catch(err => {
    showSyncStatus('❌ 保存失敗', true);
    console.error(err);
  });
}

function cloudLoad() {
  if (!GAS_URL) { alert('☁️ 同期 ▾ → ⚙️ API URL設定 からGAS URLを設定してください。'); return; }
  showSyncStatus('⏳ 読込中...', false);
  const cbName = '_gasCallback_' + Date.now();
  window[cbName] = function(cloudData) {
    data = cloudData;
    saveData();
    render();
    showSyncStatus('✅ 読込完了', false);
    delete window[cbName];
    document.getElementById(cbName).remove();
  };
  const script = document.createElement('script');
  script.id = cbName;
  script.src = GAS_URL + '?callback=' + cbName;
  script.onerror = function() {
    showSyncStatus('❌ 読込失敗', true);
    delete window[cbName];
    script.remove();
  };
  document.body.appendChild(script);
}

function toggleAutoSync() {
  autoSync = !autoSync;
  document.getElementById('autoSyncBtn').textContent = autoSync ? '🔄 自動同期OFF' : '🔄 自動同期ON';
  document.getElementById('syncBtn').textContent = autoSync ? '☁️ 自動同期中 ▾' : '☁️ 同期 ▾';
  if (autoSync && GAS_URL) cloudSave();
}

function scheduleSyncIfAuto() {
  if (!autoSync || !GAS_URL) return;
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { cloudSave(); syncTimer = null; }, 2000);
}

// Override saveData to trigger auto-sync
const _origSaveData = saveData;
saveData = function() { _origSaveData(); scheduleSyncIfAuto(); };

// Init
loadData();
const yearSelect = document.getElementById('yearSelect');
for (let y = 2024; y <= 2030; y++) { const opt = document.createElement('option'); opt.value = y; opt.textContent = y + '年'; if (y === state.year) opt.selected = true; yearSelect.appendChild(opt); }
yearSelect.onchange = function() { state.year = Number(this.value); render(); };
render();
</script>
