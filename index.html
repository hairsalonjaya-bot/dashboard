<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理ダッシュボード</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="管理DB">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
body { font-family: 'Noto Sans JP', sans-serif; }
.tabular { font-variant-numeric: tabular-nums; }
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">

<div id="app" class="max-w-6xl mx-auto px-4 py-6">

  <header class="flex flex-wrap items-center justify-between gap-4 mb-4">
    <h1 class="text-xl font-bold flex items-center gap-2">
      <span class="text-2xl">📊</span> <span id="headerTitle">管理ダッシュボード</span>
    </h1>
    <div class="flex items-center gap-3">
      <select id="yearSelect" class="rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-3 py-1.5 text-sm"></select>
      <div class="flex items-center gap-2">
        <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition">◀</button>
        <span id="monthLabel" class="text-sm font-medium min-w-[3rem] text-center"></span>
        <button onclick="changeMonth(1)" class="w-8 h-8 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition">▶</button>
      </div>
      <button onclick="loadFromCloud()" id="syncBtn" class="h-8 px-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center gap-1 hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm">🔄 読込</button>
      <button onclick="setupGasUrl()" class="h-8 px-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center gap-1 hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm">⚙️</button>
      <button onclick="toggleDark()" class="w-8 h-8 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition text-sm">🌓</button>
    </div>
  </header>

  <div class="flex gap-1 mb-4">
    <button onclick="switchMode('biz')" id="modeBtn_biz" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">💼 事業管理</button>
    <button onclick="switchMode('life')" id="modeBtn_life" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">🏠 生活管理</button>
    <button onclick="switchMode('special')" id="modeBtn_special" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">📝 特別費</button>
    <button onclick="switchMode('yearly')" id="modeBtn_yearly" class="mode-btn px-5 py-2 rounded-lg text-sm font-bold transition">📈 年度比較</button>
  </div>

  <div id="kpiCards" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>
  <div id="tabBar" class="flex gap-1 mb-4 overflow-x-auto"></div>
  <div id="mainContent"></div>

  <div id="loadingOverlay" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 text-center shadow-lg">
      <div class="text-2xl mb-2">⏳</div>
      <div class="text-sm">データ読み込み中...</div>
    </div>
  </div>
</div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// Biz categories mapping from spreadsheet
const BIZ_CAT_MAP = { '売上':'sales', '固定費':'fixed', '変動費':'variable', 'その他経費':'other', '事業経費':'biz' };
const BIZ_CAT_COLORS = { fixed:'#EF9F27', variable:'#3266ad', other:'#1D9E75', biz:'#7F77DD', sales:'#D85A30' };
const BIZ_CAT_LABELS = { fixed:'固定費', variable:'変動費', other:'その他経費', biz:'事業経費' };

// Life categories mapping
const LIFE_EXP_CATS = { '毎月固定費':'monthly_fixed', '毎月変動費':'monthly_var', '不定期固定費':'irreg_fixed', '不定期変動費':'irreg_var' };
const LIFE_INC_CATS = { '収入:予算内':'budget', '収入:予算外':'extra' };
const LIFE_INV_CATS = { '投資':'invest', '貯金':'saving' };
const LIFE_EXP_COLORS = { monthly_fixed:'#EF9F27', monthly_var:'#3266ad', irreg_fixed:'#D85A30', irreg_var:'#7F77DD' };
const LIFE_EXP_LABELS = { monthly_fixed:'毎月固定費', monthly_var:'毎月変動費', irreg_fixed:'不定期固定費', irreg_var:'不定期変動費' };

const SPECIAL_TAGS = ['自分のお金で支払ったもの','旅行','特別費','教育','医療','冠婚葬祭','家電・家具','その他'];

let GAS_URL = localStorage.getItem('gas_url') || '';
let state = { year: 2026, month: 0, tab: 'overview', mode: 'biz' };
let rawData = { biz: [], life: [], special: [] };
let charts = {};

function fmt(v) { return '¥' + Math.round(v).toLocaleString(); }
function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }
function fmtMan(v) { return '¥' + Math.round(v / 10000) + '万'; }
function monthIdx(mStr) { return MONTHS.indexOf(mStr); }
function chartColors() { const d=document.documentElement.classList.contains('dark'); return {grid:d?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)',tick:d?'#9ca3af':'#6b7280'}; }
function destroyCharts() { Object.values(charts).forEach(c=>c.destroy()); charts={}; }
function makeChart(id, cfg) { if(charts[id]) charts[id].destroy(); const c=new Chart(document.getElementById(id),cfg); charts[id]=c; return c; }

function kpiCard(label, value, sub, colorClass) {
  return `<div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700">
    <div class="text-xs text-gray-500 mb-1">${label}</div>
    <div class="text-xl font-bold tabular ${colorClass||''}">${value}</div>
    <div class="mt-1">${sub||''}</div></div>`;
}

function delta(cur, prev, invert) {
  if(!prev) return '<span class="text-gray-400 text-xs">—</span>';
  const pct=((cur-prev)/Math.abs(prev)*100).toFixed(1);
  const up=parseFloat(pct)>=0, good=invert?!up:up;
  return `<span class="text-xs ${good?'text-emerald-600':'text-red-500'}">${up?'↑':'↓'} ${Math.abs(pct)}% 前月比</span>`;
}

// === DATA HELPERS ===
function bizByMonth(mi) {
  return rawData.biz.filter(r => r.year===state.year && monthIdx(r.month) === mi);
}
function bizSales(mi) { return bizByMonth(mi).filter(r=>BIZ_CAT_MAP[r.category]==='sales').reduce((s,r)=>s+r.amount,0); }
function bizCatTotal(mi, catKey) { return bizByMonth(mi).filter(r=>BIZ_CAT_MAP[r.category]===catKey).reduce((s,r)=>s+r.amount,0); }
function bizExpense(mi) { return ['fixed','variable','other','biz'].reduce((s,c)=>s+bizCatTotal(mi,c),0); }
function bizProfit(mi) { return bizSales(mi)-bizExpense(mi); }
function sum12(fn) { return Array.from({length:12},(_,i)=>fn(i)).reduce((a,b)=>a+b,0); }

function lifeByMonth(mi) { return rawData.life.filter(r=>r.year===state.year && monthIdx(r.month)===mi); }
function lifeIncome(mi) { return lifeByMonth(mi).filter(r=>LIFE_INC_CATS[r.category]).reduce((s,r)=>s+r.amount,0); }
function lifeExpense(mi) { return lifeByMonth(mi).filter(r=>LIFE_EXP_CATS[r.category]).reduce((s,r)=>s+r.amount,0); }
function lifeInvest(mi) { return lifeByMonth(mi).filter(r=>LIFE_INV_CATS[r.category]).reduce((s,r)=>s+r.amount,0); }
function lifeExpCatTotal(mi, catKey) { return lifeByMonth(mi).filter(r=>LIFE_EXP_CATS[r.category]===catKey).reduce((s,r)=>s+r.amount,0); }
function lifeIncCatTotal(mi, catKey) { return lifeByMonth(mi).filter(r=>LIFE_INC_CATS[r.category]===catKey).reduce((s,r)=>s+r.amount,0); }
function lifeInvCatTotal(mi, catKey) { return lifeByMonth(mi).filter(r=>LIFE_INV_CATS[r.category]===catKey).reduce((s,r)=>s+r.amount,0); }

function itemsForCat(dataArr, mi, catLabel) {
  const items = {};
  dataArr.filter(r=>r.year===state.year && monthIdx(r.month)===mi && r.category===catLabel).forEach(r=>{items[r.item]=(items[r.item]||0)+r.amount;});
  return items;
}
function annualItemsForCat(dataArr, catLabel) {
  const items = {};
  dataArr.filter(r=>r.year===state.year && r.category===catLabel).forEach(r=>{items[r.item]=(items[r.item]||0)+r.amount;});
  return items;
}

// === CLOUD ===
function setupGasUrl() {
  const url = prompt('Google Apps Script のURLを入力:', GAS_URL);
  if (url !== null) { GAS_URL = url.trim(); localStorage.setItem('gas_url', GAS_URL); alert(GAS_URL ? 'URL設定完了' : 'URLクリア'); }
}

function loadFromCloud() {
  if (!GAS_URL) { alert('⚙️ボタンからAPI URLを設定してください'); return; }
  document.getElementById('loadingOverlay').classList.remove('hidden');
  document.getElementById('syncBtn').textContent = '⏳ 読込中...';
  const cb = '_cb_' + Date.now();
  window[cb] = function(d) {
    rawData = d;
    localStorage.setItem('dashboard_cache', JSON.stringify(d));
    render();
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('syncBtn').textContent = '✅ 完了';
    setTimeout(()=>{ document.getElementById('syncBtn').textContent = '🔄 読込'; }, 2000);
    delete window[cb];
    document.getElementById(cb).remove();
  };
  const s = document.createElement('script');
  s.id = cb;
  s.src = GAS_URL + '?callback=' + cb;
  s.onerror = function() {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('syncBtn').textContent = '❌ 失敗';
    setTimeout(()=>{ document.getElementById('syncBtn').textContent = '🔄 読込'; }, 2000);
    delete window[cb]; s.remove();
  };
  document.body.appendChild(s);
}

// === NAVIGATION ===
function changeMonth(d) { state.month=(state.month+d+12)%12; render(); }
function toggleDark() { document.documentElement.classList.toggle('dark'); destroyCharts(); render(); }
function switchTab(tab) { state.tab=tab; render(); }
function switchMode(mode) { state.mode=mode; state.tab='overview'; destroyCharts(); render(); }

function renderTabBar(tabs) {
  document.getElementById('tabBar').innerHTML = tabs.map(t=>
    `<button onclick="switchTab('${t.id}')" class="tab-btn px-4 py-1.5 rounded-lg text-sm font-medium transition ${t.id===state.tab?'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white':'text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800'}">${t.label}</button>`
  ).join('');
}

// === RENDER ===
function render() {
  const m = state.month;
  document.getElementById('monthLabel').textContent = MONTHS[m];
  document.getElementById('headerTitle').textContent = state.mode==='biz'?'利益管理ダッシュボード':state.mode==='life'?'生活費管理ダッシュボード':'特別費で支払ったもの';

  document.querySelectorAll('.mode-btn').forEach(b => {
    const id=b.id.replace('modeBtn_',''), active=id===state.mode;
    const ac=id==='biz'?'bg-blue-600 text-white':id==='life'?'bg-emerald-600 text-white':id==='yearly'?'bg-purple-600 text-white':'bg-amber-600 text-white';
    b.className=`mode-btn px-5 py-2 rounded-lg text-sm font-bold transition ${active?ac:'bg-white dark:bg-gray-800 text-gray-500 border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700'}`;
  });

  if (state.mode==='biz') renderBiz(m);
  else if (state.mode==='life') renderLife(m);
  else if (state.mode==='special') renderSpecial();
  else if (state.mode==='yearly') renderYearly();
}

// ======== BIZ ========
function renderBiz(m) {
  renderTabBar([{id:'overview',label:'概要'},{id:'annual',label:'年間総合'},{id:'average',label:'月平均'},{id:'expense_all',label:'月別経費'}]);
  const s=bizSales(m),e=bizExpense(m),p=bizProfit(m),r=s>0?p/s:0;
  const pm=(m-1+12)%12,ps=bizSales(pm),pe=bizExpense(pm),pp=ps-pe,pr=ps>0?pp/ps:0;
  document.getElementById('kpiCards').innerHTML =
    kpiCard('月間売上',fmt(s),delta(s,ps,false))+kpiCard('月間経費',fmt(e),delta(e,pe,true))+
    kpiCard('営業利益',fmt(p),delta(p,pp,false),p>=0?'text-emerald-600':'text-red-500')+
    kpiCard('利益率',fmtPct(r),s>0&&ps>0?`<span class="text-xs ${r>=pr?'text-emerald-600':'text-red-500'}">${r>=pr?'↑':'↓'} ${Math.abs((r-pr)*100).toFixed(1)}pt</span>`:'<span class="text-gray-400 text-xs">—</span>');

  const mc=document.getElementById('mainContent');
  if(state.tab==='overview') { mc.innerHTML=bizOverviewHTML(m); renderBizCharts(m); }
  else if(state.tab==='annual') mc.innerHTML=bizAnnualHTML();
  else if(state.tab==='expense_all') mc.innerHTML=bizExpenseAllHTML();
  else mc.innerHTML=bizAverageHTML();
}

function bizSalesBreakdownHTML(m, pm) {
  const curItems=itemsForCat(rawData.biz,m,'売上'), prevItems=itemsForCat(rawData.biz,pm,'売上');
  const allItems=new Set([...Object.keys(curItems),...Object.keys(prevItems)]);
  if (allItems.size === 0) return '';
  let sRows='';
  allItems.forEach(item=>{
    const cur=curItems[item]||0,prev=prevItems[item]||0,diff=cur-prev;
    const ann=annualItemsForCat(rawData.biz,'売上')[item]||0;
    sRows+=`<div class="t-row"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-sm" style="background:#D85A30"></span>${item}</div><div class="text-right tabular">${fmt(cur)}</div><div class="text-right tabular text-gray-500">${fmt(prev)}</div><div class="text-right tabular ${diff>0?'text-emerald-600':diff<0?'text-red-500':'text-gray-400'}">${diff===0?'—':(diff>0?'+':'')+fmt(diff)}</div><div class="text-right tabular">${fmt(ann)}</div></div>`;
  });
  const ct=bizSales(m),pt=bizSales(pm),dt=ct-pt,at=sum12(bizSales);
  sRows+=`<div class="t-row font-medium bg-gray-50 dark:bg-gray-700/50"><div>売上合計</div><div class="text-right tabular">${fmt(ct)}</div><div class="text-right tabular text-gray-500">${fmt(pt)}</div><div class="text-right tabular ${dt>0?'text-emerald-600':dt<0?'text-red-500':'text-gray-400'}">${dt===0?'—':(dt>0?'+':'')+fmt(dt)}</div><div class="text-right tabular">${fmt(at)}</div></div>`;
  return `<div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden mb-6">
    <div class="text-sm font-medium p-4 pb-2">売上内訳（${MONTHS[m]}）</div>
    <div class="grid grid-cols-[2fr_1fr_1fr_1fr_1fr] px-4 py-2 text-xs text-gray-500 font-medium border-b border-gray-200 dark:border-gray-700"><div>項目</div><div class="text-right">当月</div><div class="text-right">前月</div><div class="text-right">増減</div><div class="text-right">年間累計</div></div>
    <style>.t-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:8px 16px;font-size:13px;border-top:1px solid rgba(0,0,0,0.05)}.t-row:hover{background:rgba(0,0,0,0.02)}</style>
    ${sRows}</div>`;
}

function bizOverviewHTML(m) {
  const pm=(m-1+12)%12;
  const expCats=['固定費','変動費','その他経費','事業経費'];
  let rows='';
  expCats.forEach(catLabel=>{
    const ck=BIZ_CAT_MAP[catLabel], col=BIZ_CAT_COLORS[ck];
    const curItems=itemsForCat(rawData.biz,m,catLabel), prevItems=itemsForCat(rawData.biz,pm,catLabel);
    const allItems=new Set([...Object.keys(curItems),...Object.keys(prevItems)]);
    allItems.forEach(item=>{
      const cur=curItems[item]||0,prev=prevItems[item]||0,diff=cur-prev;
      const ann=annualItemsForCat(rawData.biz,catLabel)[item]||0;
      rows+=`<div class="t-row"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-sm" style="background:${col}"></span>${item}</div><div class="text-right tabular">${fmt(cur)}</div><div class="text-right tabular text-gray-500">${fmt(prev)}</div><div class="text-right tabular ${diff>0?'text-red-500':diff<0?'text-emerald-600':'text-gray-400'}">${diff===0?'—':(diff>0?'+':'')+fmt(diff)}</div><div class="text-right tabular">${fmt(ann)}</div></div>`;
    });
    const ct=bizCatTotal(m,ck),pt=bizCatTotal(pm,ck),dt=ct-pt,at=sum12(i=>bizCatTotal(i,ck));
    rows+=`<div class="t-row font-medium bg-gray-50 dark:bg-gray-700/50"><div>${catLabel} 小計</div><div class="text-right tabular">${fmt(ct)}</div><div class="text-right tabular text-gray-500">${fmt(pt)}</div><div class="text-right tabular ${dt>0?'text-red-500':dt<0?'text-emerald-600':'text-gray-400'}">${dt===0?'—':(dt>0?'+':'')+fmt(dt)}</div><div class="text-right tabular">${fmt(at)}</div></div>`;
  });

  const aS=sum12(bizSales),aF=sum12(i=>bizCatTotal(i,'fixed')),aV=sum12(bizExpense)-aF;
  const vr=aS>0?aV/aS:0,mr=1-vr,bep=mr>0?aF/mr:0,sf=aS>0?(aS-bep)/aS:0;

  return `
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
    <div class="lg:col-span-2 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <div class="text-sm font-medium mb-2">月次推移</div>
      <div id="legendTrend" class="flex flex-wrap gap-4 text-xs text-gray-500 mb-2"></div>
      <div class="relative h-56"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
      <div class="text-sm font-medium mb-2">費用構成比</div>
      <div id="legendPie" class="flex flex-wrap gap-3 text-xs text-gray-500 mb-2"></div>
      <div class="relative h-56"><canvas id="pieChart"></canvas></div>
    </div>
  </div>
  ${bizSalesBreakdownHTML(m,pm)}
  <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden mb-6">
    <div class="text-sm font-medium p-4 pb-2">経費内訳（${MONTHS[m]}）</div>
    <div class="grid grid-cols-[2fr_1fr_1fr_1fr_1fr] px-4 py-2 text-xs text-gray-500 font-medium border-b border-gray-200 dark:border-gray-700"><div>項目</div><div class="text-right">当月</div><div class="text-right">前月</div><div class="text-right">増減</div><div class="text-right">年間累計</div></div>
    <style>.t-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:8px 16px;font-size:13px;border-top:1px solid rgba(0,0,0,0.05)}.t-row:hover{background:rgba(0,0,0,0.02)}</style>
    ${rows}
  </div>
  <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-6">
    <div class="text-sm font-medium mb-3">損益分岐点分析</div>
    <div class="mb-3"><div class="text-xs text-gray-500">損益分岐点売上高（年間）</div><div class="text-2xl font-bold text-red-500 tabular">${fmt(bep)}</div>
    <div class="text-xs text-gray-500 mt-1">${aS>bep?`売上は損益分岐点を ${fmt(aS-bep)} 上回っています`:aS>0?`損益分岐点まで ${fmt(bep-aS)} 不足`:'データなし'}</div></div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div><div class="text-xs text-gray-500">変動費率</div><div class="text-lg font-bold tabular">${fmtPct(vr)}</div></div>
      <div><div class="text-xs text-gray-500">限界利益率</div><div class="text-lg font-bold tabular">${fmtPct(mr)}</div></div>
      <div><div class="text-xs text-gray-500">安全余裕率</div><div class="text-lg font-bold tabular ${sf>=0?'text-emerald-600':'text-red-500'}">${fmtPct(sf)}</div></div>
    </div>
  </div>`;
}

function renderBizCharts(m) {
  const cc=chartColors();
  const sd=MONTHS.map((_,i)=>bizSales(i)||null), ed=MONTHS.map((_,i)=>{const e=bizExpense(i);return e>0?e:null;}), pd=MONTHS.map((_,i)=>{const s=bizSales(i),e=bizExpense(i);return(s>0||e>0)?s-e:null;});
  makeChart('trendChart',{type:'bar',data:{labels:MONTHS,datasets:[{label:'売上',data:sd,backgroundColor:'#3266ad',borderRadius:3,order:2},{label:'経費',data:ed,backgroundColor:'#B4B2A9',borderRadius:3,order:3},{label:'利益',data:pd,type:'line',borderColor:'#1D9E75',borderWidth:2,pointRadius:4,pointBackgroundColor:'#1D9E75',fill:false,order:1,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:11},color:cc.tick},grid:{display:false}},y:{ticks:{callback:v=>fmtMan(v),font:{size:11},color:cc.tick},grid:{color:cc.grid}}}}});
  document.getElementById('legendTrend').innerHTML=[['#3266ad','売上高'],['#B4B2A9','経費合計'],['#1D9E75','営業利益']].map(([c,l])=>`<span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm inline-block" style="background:${c}"></span>${l}</span>`).join('');

  const vals=['fixed','variable','other','biz'].map(c=>bizCatTotal(m,c));
  const total=vals.reduce((a,b)=>a+b,0);

function bizExpenseAllHTML() {
  const expCats = ['固定費','変動費','その他経費','事業経費'];
  const allItems = [];
  expCats.forEach(catLabel => {
    const ck = BIZ_CAT_MAP[catLabel], col = BIZ_CAT_COLORS[ck];
    const seen = new Set();
    for(let i=0;i<12;i++) { Object.keys(itemsForCat(rawData.biz,i,catLabel)).forEach(it=>seen.add(it)); }
    seen.forEach(item => allItems.push({catLabel,ck,col,item}));
    allItems.push({catLabel,ck,col,item:null,isTotal:true});
  });

  const thStyle = 'py-2 px-2 text-right text-xs font-medium text-gray-500 whitespace-nowrap';
  const tdBase = 'py-2 px-2 text-right text-xs tabular whitespace-nowrap';
  let header = `<th class="py-2 px-3 text-left text-xs font-medium text-gray-500 sticky left-0 bg-white dark:bg-gray-800 z-10 min-w-[140px]">項目</th>`;
  MONTHS.forEach(ml => { header += `<th class="${thStyle}">${ml}</th>`; });
  header += `<th class="${thStyle} text-gray-700 dark:text-gray-300">年間計</th>`;

  let rows = '';
  let prevCat = null;
  allItems.forEach(({catLabel,ck,col,item,isTotal}) => {
    if(catLabel !== prevCat && !isTotal) {
      rows += `<tr class="bg-gray-100 dark:bg-gray-700/60"><td colspan="14" class="py-1 px-3 text-xs font-bold" style="color:${col}">${catLabel}</td></tr>`;
      prevCat = catLabel;
    }
    if(isTotal) {
      const vals = MONTHS.map((_,i) => bizCatTotal(i,ck));
      const ann = vals.reduce((a,b)=>a+b,0);
      rows += `<tr class="bg-gray-50 dark:bg-gray-700/40 font-medium border-t border-gray-200 dark:border-gray-600">
        <td class="py-1.5 px-3 text-xs sticky left-0 bg-gray-50 dark:bg-gray-700/40 z-10">${catLabel} 小計</td>
        ${vals.map(v=>`<td class="${tdBase} font-medium">${v>0?fmt(v):'—'}</td>`).join('')}
        <td class="${tdBase} font-bold">${fmt(ann)}</td></tr>`;
    } else {
      const vals = MONTHS.map((_,i) => (itemsForCat(rawData.biz,i,catLabel)[item])||0);
      const ann = vals.reduce((a,b)=>a+b,0);
      if(ann === 0) return;
      rows += `<tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/20">
        <td class="py-1.5 px-3 text-xs sticky left-0 bg-white dark:bg-gray-800 z-10"><span class="inline-block w-2 h-2 rounded-sm mr-1.5" style="background:${col}"></span>${item}</td>
        ${vals.map(v=>`<td class="${tdBase} text-gray-600 dark:text-gray-400">${v>0?fmt(v):'—'}</td>`).join('')}
        <td class="${tdBase}">${fmt(ann)}</td></tr>`;
    }
  });

  const totals = MONTHS.map((_,i)=>bizExpense(i));
  const grandTotal = totals.reduce((a,b)=>a+b,0);
  rows += `<tr class="bg-gray-100 dark:bg-gray-600/50 border-t-2 border-gray-300 dark:border-gray-500 font-bold">
    <td class="py-2 px-3 text-xs sticky left-0 bg-gray-100 dark:bg-gray-600/50 z-10">経費 合計</td>
    ${totals.map(v=>`<td class="${tdBase} font-bold">${v>0?fmt(v):'—'}</td>`).join('')}
    <td class="${tdBase} font-bold">${fmt(grandTotal)}</td></tr>`;

  return `<div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-x-auto">
    <div class="text-sm font-medium p-4 pb-2">経費 月別一覧（${state.year}年）</div>
    <table class="w-full text-sm border-collapse">
      <thead><tr class="bg-gray-50 dark:bg-gray-700/50">${header}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function bizAverageHTML() {

function renderLife(m) {

  let rows = '';
  ['投資','貯金'].forEach(catLabel => {
    const ck = LIFE_INV_CATS[catLabel];
    const col = ck==='invest' ? '#1D9E75' : '#3266ad';
    const seen = new Set();
    for(let i=0;i<12;i++) { Object.keys(itemsForCat(rawData.life,i,catLabel)).forEach(it=>seen.add(it)); }
    if(seen.size === 0) return;

    rows += `<tr class="bg-gray-100 dark:bg-gray-700/60"><td colspan="14" class="py-1 px-3 text-xs font-bold" style="color:${col}">${catLabel}</td></tr>`;

    seen.forEach(item => {
      const vals = MONTHS.map((_,i) => (itemsForCat(rawData.life,i,catLabel)[item])||0);
      const ann = vals.reduce((a,b)=>a+b,0);
      if(ann === 0) return;
      rows += `<tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/20">
        <td class="py-1.5 px-3 text-xs sticky left-0 bg-white dark:bg-gray-800 z-10"><span class="inline-block w-2 h-2 rounded-sm mr-1.5" style="background:${col}"></span>${item}</td>
        ${vals.map(v=>`<td class="${tdBase} text-gray-600 dark:text-gray-400">${v>0?fmt(v):'—'}</td>`).join('')}
        <td class="${tdBase} font-medium">${fmt(ann)}</td></tr>`;
    });

    const catVals = MONTHS.map((_,i) => lifeInvCatTotal(i,ck));
    const catAnn = catVals.reduce((a,b)=>a+b,0);
    rows += `<tr class="bg-gray-50 dark:bg-gray-700/40 font-medium border-t border-gray-200 dark:border-gray-600">
      <td class="py-1.5 px-3 text-xs sticky left-0 bg-gray-50 dark:bg-gray-700/40 z-10">${catLabel} 小計</td>
      ${catVals.map(v=>`<td class="${tdBase} font-medium">${v>0?fmt(v):'—'}</td>`).join('')}
      <td class="${tdBase} font-bold">${fmt(catAnn)}</td></tr>`;
  });

  const totals = MONTHS.map((_,i)=>lifeInvest(i));
  const grandTotal = totals.reduce((a,b)=>a+b,0);
  rows += `<tr class="bg-gray-100 dark:bg-gray-600/50 border-t-2 border-gray-300 dark:border-gray-500 font-bold">
    <td class="py-2 px-3 text-xs sticky left-0 bg-gray-100 dark:bg-gray-600/50 z-10">合計</td>
    ${totals.map(v=>`<td class="${tdBase} font-bold">${v>0?fmt(v):'—'}</td>`).join('')}
    <td class="${tdBase} font-bold text-emerald-600">${fmt(grandTotal)}</td></tr>`;

  return `<div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-x-auto">
    <div class="flex items-center justify-between p-4 pb-2">
      <div class="text-sm font-medium">投資・貯金 月別一覧（${state.year}年）</div>
      <div class="text-sm">投資 年間累計: <span class="font-bold tabular text-emerald-600">${fmt(sum12(i=>lifeInvCatTotal(i,'invest')))}</span></div>
    </div>
    <table class="w-full text-sm border-collapse">
      <thead><tr class="bg-gray-50 dark:bg-gray-700/50">${header}</tr></thead>
      <tbody>${rows||'<tr><td colspan="14" class="py-8 text-center text-gray-400 text-sm">投資・貯金データがありません</td></tr>'}</tbody>
    </table>
  </div>`;
}

function lifeAverageHTML() {
  const mwd=Array.from({length:12},(_,i)=>lifeIncome(i)>0||lifeExpense(i)>0?1:0).reduce((a,b)=>a+b,0);
  const n=mwd||1,aI=sum12(lifeIncome)/n,aE=sum12(lifeExpense)/n,aB=aI-aE;
  return `<div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">${kpiCard('月平均収入',fmt(aI),'')}${kpiCard('月平均支出',fmt(aE),'')}${kpiCard('月平均収支',fmt(aB),`<span class="text-xs text-gray-500">対象: ${mwd}ヶ月</span>`,aB>=0?'text-emerald-600':'text-red-500')}</div>`;
}

// ======== SPECIAL ========
function renderSpecial() {
  document.getElementById('tabBar').innerHTML='';
  document.getElementById('kpiCards').innerHTML='';
  const rows=(rawData.special||[]).filter(r=>r.year===state.year||!r.year);
  const tagTotals={};SPECIAL_TAGS.forEach(t=>tagTotals[t]=0);let gt=0;
  rows.forEach(r=>{const a=Number(r.amount)||0;gt+=a;if(r.tag&&tagTotals[r.tag]!==undefined)tagTotals[r.tag]+=a;});

  let sc=kpiCard('合計金額',fmt(gt),`<span class="text-xs text-gray-500">${rows.length}件</span>`);
  SPECIAL_TAGS.forEach(t=>{if(tagTotals[t]>0)sc+=kpiCard(t,fmt(tagTotals[t]),'');});

  let tr2='';
  rows.forEach((r,i)=>{
    tr2+=`<tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30">
      <td class="py-2 px-3 text-center text-xs text-gray-400">${i+1}</td>
      <td class="py-2 px-3 text-sm">${r.date||''}</td>
      <td class="py-2 px-3 text-sm">${r.content||''}</td>
      <td class="py-2 px-3 text-sm">${r.tag?`<span class="px-2 py-0.5 rounded text-xs bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-300">${r.tag}</span>`:''}</td>
      <td class="py-2 px-3 text-right text-sm tabular">${r.amount?fmt(r.amount):''}</td>
      <td class="py-2 px-3 text-sm text-gray-500">${r.memo||''}</td>
    </tr>`;
  });

  document.getElementById('mainContent').innerHTML=`
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">${sc}</div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-x-auto">
      <table class="w-full min-w-[600px]">
        <thead><tr class="bg-gray-50 dark:bg-gray-700/50">
          <th class="py-2 px-3 text-center text-xs font-medium text-gray-500 w-8">#</th>
          <th class="py-2 px-3 text-left text-xs font-medium text-gray-500 w-28">日付</th>
          <th class="py-2 px-3 text-left text-xs font-medium text-gray-500">内容</th>
          <th class="py-2 px-3 text-left text-xs font-medium text-gray-500 w-40">分類</th>
          <th class="py-2 px-3 text-right text-xs font-medium text-gray-500 w-28">金額</th>
          <th class="py-2 px-3 text-left text-xs font-medium text-gray-500 w-40">メモ</th>
        </tr></thead>
        <tbody>${tr2||'<tr><td colspan="6" class="py-8 text-center text-gray-400 text-sm">スプレッドシートの「特別費」シートにデータを入力してください</td></tr>'}</tbody>
      </table>
    </div>`;
}

// ======== YEARLY ========
const YEAR_PALETTE = ['#3266ad','#D85A30','#1D9E75','#7F77DD','#EF9F27','#E24B4A'];

function renderYearly() {
  document.getElementById('headerTitle').textContent = '同月比較';
  document.getElementById('kpiCards').innerHTML = '';

  const yearSet = new Set();
  rawData.biz.forEach(r => { if(r.year) yearSet.add(Number(r.year)); });
  rawData.life.forEach(r => { if(r.year) yearSet.add(Number(r.year)); });
  const years = Array.from(yearSet).sort();

  if (years.length === 0) {
    document.getElementById('tabBar').innerHTML = '';
    document.getElementById('mainContent').innerHTML = '<div class="text-center text-gray-400 py-16">データがありません。🔄 読込 を押してください。</div>';
    return;
  }

  // タブ選択（メトリクス）
  if (!['sales','expense','profit','invest'].includes(state.tab)) state.tab = 'sales';
  renderTabBar([
    {id:'sales',   label:'売上'},
    {id:'expense', label:'経費'},
    {id:'profit',  label:'利益'},
    {id:'invest',  label:'投資'},
  ]);

  // 月×年 の値を返す関数
  function monthVal(y, mi, metric) {
    const yr = Number(y);
    if (metric === 'sales')   return rawData.biz.filter(r=>Number(r.year)===yr && monthIdx(r.month)===mi && BIZ_CAT_MAP[r.category]==='sales').reduce((s,r)=>s+r.amount,0);
    if (metric === 'expense') return rawData.biz.filter(r=>Number(r.year)===yr && monthIdx(r.month)===mi && ['fixed','variable','other','biz'].includes(BIZ_CAT_MAP[r.category])).reduce((s,r)=>s+r.amount,0);
    if (metric === 'profit')  { const s=monthVal(y,mi,'sales'),e=monthVal(y,mi,'expense'); return (s>0||e>0)?s-e:null; }
    if (metric === 'invest')  return rawData.life.filter(r=>Number(r.year)===yr && monthIdx(r.month)===mi && LIFE_INV_CATS[r.category]==='invest').reduce((s,r)=>s+r.amount,0);
    return 0;
  }

  const metric = state.tab;
  const metricLabel = {sales:'売上高', expense:'経費合計', profit:'営業利益', invest:'投資'}[metric];
  const isInvert = metric === 'expense';
  const isProfit = metric === 'profit';

  const cc = chartColors();
  // チャート用データセット（年ごとに1ライン）
  const datasets = years.map((y, yi) => {
    const col = YEAR_PALETTE[yi % YEAR_PALETTE.length];
    const data = MONTHS.map((_, mi) => { const v=monthVal(y,mi,metric); return v===null||v===0?null:v; });
    return { label: y+'年', data, borderColor: col, backgroundColor: col+'33', borderWidth: 2, pointRadius: 4, pointBackgroundColor: col, fill: false, tension: 0.3, spanGaps: false };
  });

  // 比較テーブル（行=月、列=年ごとの値＋前年比）
  const ly = years[years.length-1];
  const py = years.length >= 2 ? years[years.length-2] : null;

  let tableHead = '<th class="py-2 px-3 text-left text-xs font-medium text-gray-500">月</th>';
  years.forEach((y,yi) => {
    const col = YEAR_PALETTE[yi % YEAR_PALETTE.length];
    tableHead += `<th class="py-2 px-3 text-right text-xs font-medium whitespace-nowrap" style="color:${col}">${y}年</th>`;
  });
  if (py) tableHead += `<th class="py-2 px-3 text-right text-xs font-medium text-gray-500">前年比</th>`;

  let tableRows = '';
  let annuals = years.map(() => 0);
  MONTHS.forEach((ml, mi) => {
    const vals = years.map(y => monthVal(y, mi, metric));
    const lv = vals[vals.length-1] || 0;
    const pv = py ? (vals[vals.length-2] || 0) : null;
    const diff = pv !== null ? lv - pv : null;
    const pct = pv ? ((lv-pv)/Math.abs(pv)*100).toFixed(1) : null;
    const good = pct !== null ? (isInvert ? parseFloat(pct)<0 : parseFloat(pct)>=0) : true;
    vals.forEach((v,i) => { if(v) annuals[i] += v; });
    tableRows += `<tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/20">
      <td class="py-2 px-3 text-sm font-medium">${ml}</td>
      ${vals.map(v=>`<td class="py-2 px-3 text-right text-sm tabular ${isProfit?(v>=0?'text-emerald-600':'text-red-500'):''}">${v?fmt(v):'—'}</td>`).join('')}
      ${py ? `<td class="py-2 px-3 text-right text-xs tabular ${pct!==null?(good?'text-emerald-600':'text-red-500'):'text-gray-400'}">${pct!==null?(parseFloat(pct)>=0?'↑':'↓')+' '+Math.abs(pct)+'%':'—'}</td>` : ''}
    </tr>`;
  });
  // 年間合計行
  tableRows += `<tr class="bg-gray-50 dark:bg-gray-700/50 border-t-2 border-gray-300 dark:border-gray-600 font-bold">
    <td class="py-2 px-3 text-sm">年間合計</td>
    ${annuals.map(v=>`<td class="py-2 px-3 text-right text-sm tabular">${v?fmt(v):'—'}</td>`).join('')}
    ${py ? (() => { const lv=annuals[annuals.length-1],pv=annuals[annuals.length-2]; const pct=pv?((lv-pv)/Math.abs(pv)*100).toFixed(1):null; const good=pct!==null?(isInvert?parseFloat(pct)<0:parseFloat(pct)>=0):true; return `<td class="py-2 px-3 text-right text-xs tabular ${pct!==null?(good?'text-emerald-600':'text-red-500'):'text-gray-400'}">${pct!==null?(parseFloat(pct)>=0?'↑':'↓')+' '+Math.abs(pct)+'%':'—'}</td>`; })() : ''}
  </tr>`;

  const legendHTML = years.map((y,yi)=>`<span class="flex items-center gap-1.5"><span class="w-5 h-0.5 inline-block rounded" style="background:${YEAR_PALETTE[yi%YEAR_PALETTE.length]}"></span><span>${y}年</span></span>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 mb-4">
      <div class="flex items-center justify-between mb-1">
        <div class="text-sm font-medium">${metricLabel} — 同月年度比較</div>
        <div class="flex flex-wrap gap-3 text-xs text-gray-500" id="yearLegend">${legendHTML}</div>
      </div>
      <div class="relative h-72"><canvas id="yearLineChart"></canvas></div>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-x-auto">
      <div class="text-sm font-medium p-4 pb-2">${metricLabel} 月別一覧</div>
      <table class="w-full">
        <thead><tr class="bg-gray-50 dark:bg-gray-700/50">${tableHead}</tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;

  makeChart('yearLineChart', {
    type: 'line',
    data: { labels: MONTHS, datasets },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label: ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}`}} },
      scales:{
        x:{ ticks:{autoSkip:false,font:{size:11},color:cc.tick}, grid:{display:false} },
        y:{ ticks:{callback:v=>fmtMan(v),font:{size:11},color:cc.tick}, grid:{color:cc.grid} }
      }
    }
  });
}

// === INIT ===
const cached = localStorage.getItem('dashboard_cache');
if (cached) { try { rawData = JSON.parse(cached); } catch(e) {} }

const yearSelect = document.getElementById('yearSelect');
for (let y=2024;y<=2030;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'年';if(y===state.year)o.selected=true;yearSelect.appendChild(o);}
yearSelect.onchange=function(){state.year=Number(this.value);render();};

render();
if (GAS_URL) setTimeout(loadFromCloud, 500);
</script>
</body>
